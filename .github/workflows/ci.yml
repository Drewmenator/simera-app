name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # next-env.d.ts is gitignored + generated by `next build`; recreate the
      # stub so a standalone `tsc` run resolves Next's global types.
      - name: Generate Next type stub
        run: printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts
      - name: Typecheck
        run: npx tsc --noEmit
      # NOTE: `npm run lint` is intentionally NOT a blocking gate yet — there is a
      # backlog of ~90 eslint errors (mostly react-hooks/set-state-in-effect).
      # Reported here as non-blocking; promote to a hard gate once cleaned up.
      - name: Lint (non-blocking)
        run: npm run lint || true

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
